server:
  port: 8090
  ssl:
    enabled: false
    key-store: classpath:keystore/gameclaw-dev.p12
    key-store-password: gameclaw
    key-store-type: PKCS12
    key-alias: gameclaw-dev

gameclaw:
  llm:
    adapter: spring-ai
  workspace: file:./workspace/
  multi-tenancy:
    enabled: false
    default-tenant-id: 00000000-0000-0000-0000-000000000001
  security:
    mode: dev
    outbound:
      enabled: true
      allowed-hosts:
        - api.anthropic.com
        - api.openai.com
        - generativelanguage.googleapis.com
        - api.deepseek.com
        - api.mistral.ai
        - api.minimaxi.chat
        - api.groq.com
        - api.x.ai
        - openrouter.ai
        - api-inference.huggingface.co
        - models.inference.ai.azure.com
        - dashscope.aliyuncs.com
        - dashscope-intl.aliyuncs.com
        - qianfan.baidubce.com
        - api.moonshot.cn
        - api.stepfun.com
        - api.hunyuan.cloud.tencent.com
        - ark.cn-beijing.volces.com
        - ark.ap-southeast.bytepluses.com
        - open.bigmodel.cn
        - api.xiaomi.com
        - api.sensenova.cn
        - api.synthetic.new
        - api.siliconflow.cn
        - open.feishu.cn
        - registry.clawhub.io
        - localhost
  governance:
    impact:
      high-impact-file-count: 10
      medium-impact-file-count: 5
      max-scan-files: 1000
    approval:
      enabled: true
      default-ttl-minutes: 60
    rollback:
      enabled: true
      auto:
        enabled: false
        check-interval-ms: 30000
        error-rate-threshold: 0.05
        deploy-window-seconds: 600

spring:
  application:
    name: gameclaw
  messages:
    basename: i18n/messages
    fallback-to-system-locale: false
    encoding: UTF-8
  config:
    import: optional:classpath:application.private.yaml
  datasource:
    url: jdbc:h2:file:./workspace/app
    username: sa
    password:
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
  ai:
    model:
      chat: unknown
      audio.speech: unknown
      audio.transcription: unknown
      embedding: unknown
      image: unknown
      moderation: unknown
      ocr: unknown
  threads:
    virtual:
      enabled: true

management:
  endpoint:
    restart:
      enabled: true
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        llm_latency_seconds: true
    export:
      prometheus:
        enabled: true

pebble:
  suffix: .html.peb

agent:
  onboarding:
    completed: false
  workspace: file:./workspace/

jobrunr:
  background-job-server:
    enabled: true
    worker-count: 1
  dashboard:
    enabled: true
    port: 8091

resilience4j:
  bulkhead:
    instances:
      llm-anthropic:
        max-concurrent-calls: 100
        max-wait-duration: 5s
      llm-openai:
        max-concurrent-calls: 100
        max-wait-duration: 5s
      llm-ollama:
        max-concurrent-calls: 20
        max-wait-duration: 3s
      mcp-clickhouse:
        max-concurrent-calls: 50
        max-wait-duration: 5s
  ratelimiter:
    instances:
      llm-anthropic:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 2s
  circuitbreaker:
    instances:
      llm-default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 50
