name: CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn clean verify -pl '!mcp-servers/java' -B

  spotbugs-checkstyle:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: SpotBugs Check
        run: mvn spotbugs:check -pl '!mcp-servers/java' -B || true

      - name: Checkstyle Check
        run: mvn checkstyle:check -pl '!mcp-servers/java' -B || true

  rls-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: RLS Lint
        run: bash scripts/rls-lint.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
